<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Locked-Up! Card Game</title>

    <!-- GAME CSS ONLY -->
    <link href="locked-up.css" rel="stylesheet">
</head>

<body>

    <!-- GAME WINDOW -->
    <div id="game-window">

        <div id="table-wrapper">
            <div class="table-surface">

                <!-- Card Slots -->
                <div id="player-card-slot" class="card-slot-placeholder"></div>
                <div id="partner-card-slot" class="card-slot-placeholder"></div>
                <div id="opponent1-card-slot" class="card-slot-placeholder"></div>
                <div id="opponent2-card-slot" class="card-slot-placeholder"></div>

                <!-- Portraits -->
                <div id="player-portrait" class="portrait-placeholder"></div>
                <div id="partner-portrait" class="portrait-placeholder"></div>
                <div id="opponent1-portrait" class="portrait-placeholder"></div>
                <div id="opponent2-portrait" class="portrait-placeholder"></div>

                <!-- Shuffle + Deck -->
                <button id="shuffle-btn" class="btn-game">Shuffle Deck</button>
                <div id="visual-deck"></div>

            </div>
        </div>

    </div>

    <!-- GAME LOGIC -->
    <script src="locked-up.js"></script>

</body>
</html>
